# Build and serve your site with:
#     bundle update
#     bundle exec jekyll serve

# This config file affect your entire site. It is only read when Jekyll is started
# If you change this file, you must restart the server process.

# The build is slightly different if you are running in production mode or in development mode
# Set the JEKYLL_ENV environment variable to 'production' to enable a production build - like this
#      JEKYLL_ENV=production bundle exec jekyll serve  



# remote_theme: thetechcollective/minimal-mistakes
minimal_mistakes_skin    : dod
remote_theme             : devopsdays-dk/minimal-mistakes

# Site Settings
locale                   : "en-US"
title                    : &title "DevOpsDays"
title_separator          : "-"
description              : &description "The Danish Chapter of the DevOpsDays community conference series"
subtitle                 : # &subtitle "Part of Something Bigger" # site tagline that appears below site title in masthead
name                     : *title
masthead_title           : ' ' # overrides the website title displayed in the masthead, use " " for no title
logo_link                : "/home/"
terms_url                : /terms/
url                      : "https://www.devopsdays.dk"
cfp_form_url             : /proposals/ #https://sessionize.com/devopsdays-2026/
baseurl                  : # the subpath of your site, e.g. "/blog"
repository               : "devopsdays-dk/devopsdays.dk" # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes"
teaser                   : # path of fallback teaser image, e.g. "/assets/images/500x300.png"
logo                     : "/assets/images/dodd_logo_rgb_purple.png" # path of logo image to display in the masthead, e.g. "/assets/images/88x88.png"
# breadcrumbs            : false # true, false (default)
words_per_minute         : 200
comments:
  provider               : giscus # "giscus" # false (default)
  ## https://giscus.app/ 
  giscus:
    repo                  : "devopsdays-dk/pub-giscus"
    repo_id               : "R_kgDOQgbeVg"
    category              : "Giscus"
    category_id           : "DIC_kwDOQgbeVs4CzQSj"
    mapping               : "pathname"
    strict                : "0"
    reactions_enabled     : "1"
    emit_metadata         : "0"
    input_position        : "top"
    theme                 : "purple_dark" 
    # theme                 : "https://www.devopsdays.dk/assets/css/dod_giscus.css"
    lang                  : "en"
    loading               : "lazy"

atom_feed:
  path                   : # blank (default) uses feed.xml
  hide                   : # true, false (default)
search                   : true # true, false (default)
search_full_content      : true # true, false (default)
search_provider          : lunr 
lunr:
  search_within_pages    : # true, false (default)
font_awesome_kit_id      : 17b5a92563 # Font Awesome Kit ID
head_scripts:
  - https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js
  - https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js

# SEO Related
google_site_verification :
bing_site_verification   :
naver_site_verification  :
yandex_site_verification :
baidu_site_verification  :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : /assets/images/dod-logo-purple.png # Open Graph/Twitter default site image
# For specifying social profiles
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type                   : # Person or Organization (defaults to Person)
  name                   : # If the user or organization name differs from the site's name
  links: # An array of links to social media profiles

# Analytics
analytics:
  provider               : google-gtag # false (default), "google", "google-universal", "google-gtag", "custom"
  google:
    tracking_id          : G-2FM92L1EDB # denmark@devopsdays.dk -> www.devopsdays.dk -> web
    anonymize_ip         : true # true, false (default)


# Site Author
author:
  name             : "DevOpsDays Denmark"
  avatar           : "/assets/images/dod-logo-purple.png"
  bio              : "Part of Something Bigger"
  location         : "Copenhagen + Aarhus. Denmark"
  email            :
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:denmark@devopsdays.org"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://www.devopsdays.dk"
#    - label: "Twitter"
#      icon: "fab fa-fw fa-twitter-square"
#      url: "https://twitter.com/"
#    - label: "Facebook"
#      icon: "fab fa-fw fa-facebook-square"
#      # url: "https://facebook.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/devopsdays-dk"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/company/79701062"
#    - label: "Instagram"
#      icon: "fab fa-fw fa-instagram"
#      url: "https://instagram.com/"

# Site Footer
footer:
  powered_by: # Enabled if both name and url are defined
    name: "DevOpsDays"
    url:  "https://devopsdays.org/denmark"
  links:
#   - label: "Lars Kruse"
#     icon: "fas fa-fw fa-link"
#     url: "https://www.lakruzz.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/devopsdays-dk"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/company/79701062"


# Reading Files
include:
  - _pages
  - .well-known
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - cspell.json
  - /docs # ignore Minimal Mistakes /docs
  - /test # ignore Minimal Mistakes /test
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS
# https://github.com/jekyll/jekyll-sass-converter
sass:
  sass_dir: _sass
  style: compressed 
  sourcemap: development
  quiet_deps: true
  quiet: true
  silence_deprecation: 
    - import


# Outputting
permalink: /:categories/:title/
paginate:  # amount of posts to show
paginate_path: /stories/page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path>/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path>/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# https://github.com/jekyll/jekyll-archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/


# HTML Compression
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development

collections:
  posts:
    output: true
    permalink: /stories/:title/
  events:
    output: true
    permalink: /:collection/:path/
  profiles:
    output: true
    permalink: /:collection/:title/
  talks:
    output: true
    permalink: /:collection/:title/    

# Defaults
defaults:
  # _pages
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
  # _events
  - scope:
      path: ""
      type: events
    values:
      layout: event
      author_profile: false
      share: # true
      comments: false
      related: true
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments:  true
      share: # true
      related: true
  # _profiles
  - scope:
      path: ""
      type: profiles
    values:
      layout: profile
      author_profile: false
      share: false
      comments: false
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: false
      share: false
      comments: false
