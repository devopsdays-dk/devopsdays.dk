
name: Deploy

on:
  workflow_dispatch:
  push:
    branches: 
      - 'main'

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  deploy_artifact_to_pages:
    name: Deploy prebuilt artifact to GitHub Pages
    runs-on: ubuntu-latest 
    permissions:
      statuses: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy artifact
        uses: devx-cafe/takt-actions/deploy-artifact@v1
        # with:
        #   artifact_name: # default "site-${{ github.sha }}"
        #   artifact_path: # default "_site"
        #   status_context: # default "deploy:pages"
